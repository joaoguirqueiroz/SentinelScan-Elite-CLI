app:
  language: pt-BR
  timezone: America/Fortaleza

scanners:
  defaults:
    profile: basic
    timeout: 60
    concurrency: 5
    rate_limit: 25
    max_targets: 25
  smart:
    default_profile: basic
    large_target_threshold: 10
  nmap:
    default_profile: basic
    allowed_nse_profiles:
      - default-safe
      - discovery
      - version
      - safe
      - custom-authorized
    allowed_nse_scripts:
      - default
      - discovery
      - version
      - safe
      - http-title
      - http-headers
  nuclei:
    default_profile: basic
    severities:
      - info
      - low
      - medium
      - high
      - critical
    tags:
      - tech
      - exposure
      - misconfig
    templates: []
    template_dirs: []

baseline:
  enabled: true
  alert_new_open_ports: true
  alert_new_high_findings: true

alerts:
  terminal: true
  report: true
  history: true
